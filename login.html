<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#2d5927",
                "accent-brown": "#4B3621",
                "background-light": "#f6f7f6",
                "background-dark": "#161d15",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<title>Login - PanenHub</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-full min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-primary flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-primary text-xl font-bold leading-tight tracking-tight flex-1 text-center pr-12">PanenHub</h2>
</div>
<!-- Hero / Logo Section -->
<div class="@container px-6 py-8">
<div class="flex flex-col items-center">
<div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-5xl text-primary">potted_plant</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight text-center">Selamat Datang</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pt-2 text-center max-w-[280px]">
                    Masuk untuk mengelola hasil panen dan distribusi Anda
                </p>
</div>
</div>
<!-- Login Form Container -->
<div class="flex flex-col gap-5 px-6 pb-8 w-full max-w-[480px] mx-auto">
<!-- Email/Phone Input -->
<label class="flex flex-col w-full">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-2 px-1 uppercase tracking-wider">Email atau Nomor Telepon</span>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60">person</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark/50 focus:border-primary focus:ring-1 focus:ring-primary h-14 pl-12 pr-4 placeholder:text-slate-400 text-base" placeholder="Email atau nomor HP" type="text"/>
</div>
</label>
<!-- Password Input -->
<label class="flex flex-col w-full">
<div class="flex justify-between items-center pb-2 px-1">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal uppercase tracking-wider">Password</span>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60">lock</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark/50 focus:border-primary focus:ring-1 focus:ring-primary h-14 pl-12 pr-12 placeholder:text-slate-400 text-base" placeholder="Masukkan password" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer">visibility_off</span>
</div>
</label>
<!-- Forgot Password -->
<div class="flex justify-end px-1">
<a class="text-primary font-semibold text-sm hover:underline" href="lupa_password.html">Lupa Password?</a>
</div>
<!-- Login Button -->
<div class="pt-4">
<button type="button" onclick="window.location.href='dashboard.html'" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-colors duration-200">
                    Masuk
                </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 py-4">
<div class="h-[1px] bg-primary/10 flex-1"></div>
<span class="text-slate-400 text-xs uppercase font-bold tracking-widest">atau</span>
<div class="h-[1px] bg-primary/10 flex-1"></div>
</div>
<!-- Alternative Login -->
<div class="flex gap-4">
<button class="flex-1 flex items-center justify-center gap-2 border border-primary/20 bg-white dark:bg-transparent py-3 rounded-xl hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-xl text-accent-brown">google</span>
<span class="text-slate-700 dark:text-slate-200 font-medium">Google</span>
</button>
</div>
</div>
<!-- Footer / Sign Up Link -->
<div class="mt-auto pb-10 px-6 text-center">
<p class="text-slate-600 dark:text-slate-400">
                Belum punya akun? 
                <a class="text-primary font-bold hover:underline" href="registrasi_panenhub_simpel.html">Daftar Sekarang</a>
</p>
</div>
<!-- Decorative Element -->
<div class="fixed bottom-0 right-0 -z-10 opacity-10">
<span class="material-symbols-outlined text-[200px] text-primary rotate-12">eco</span>
</div>
</div>
</body></html>
