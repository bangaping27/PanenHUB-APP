<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2d5927",
                        "background-light": "#f6f7f6",
                        "background-dark": "#161d15",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>PanenHub Validation</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-screen w-full max-w-md mx-auto flex-col overflow-hidden border-x border-primary/10">
<!-- Header -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between border-b border-primary/10">
<button type="button" onclick="window.location.href='dashboard.html'" class="text-primary flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Validasi PanenHub</h2>
</div>
<!-- Main Content -->
<div class="flex-1 flex flex-col items-center px-6 pt-10 overflow-y-auto">
<div class="text-center mb-8">
<h3 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight mb-3">Scan QR di Pos PanenHub</h3>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">
                    Arahkan kamera ke kode QR yang tersedia di lokasi untuk melakukan validasi pengiriman hasil panen.
                </p>
</div>
<!-- Scanner Viewfinder Simulation -->
<div class="relative w-full aspect-square max-w-[280px] group">
<!-- Corner Borders -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-primary rounded-tl-xl z-10"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-primary rounded-tr-xl z-10"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-primary rounded-bl-xl z-10"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-primary rounded-br-xl z-10"></div>
<!-- Inner Camera Feed Mock -->
<div class="w-full h-full bg-slate-200 dark:bg-slate-800 rounded-xl overflow-hidden flex items-center justify-center relative">
<img class="absolute inset-0 w-full h-full object-cover opacity-50 blur-[2px]" data-alt="Blurred background of a rural agricultural collection point" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBlXYe_TlQyaWvcv7iDXaf9nR9EWxsA2bA6RI8DSi2OlPijBfQYaL5sEmy_S8dSD6L4zICbE3cSYirl82fIJHJYDhonT85huSO9E5mR2v5_QQjHxTtxUvoa2wsVX4z2diaPANyuN2UpGk4tJBHhvB6ifYvF8S7nEYjeljJl21A5FWUSEM3IDAVKgKfoaQO0Bi62rwunhxv7cIsz4IbvsSa1Y860mXNINVNY956o9nuP9SPb-D2VM-2VrGLZWOpAUwvPFdexWWJtRTY"/>
<!-- QR Illustration -->
<div class="relative z-10 p-8 bg-white/90 dark:bg-black/40 rounded-lg shadow-xl backdrop-blur-sm">
<span class="material-symbols-outlined text-primary !text-8xl opacity-80">qr_code_2</span>
</div>
<!-- Scanning Line -->
<div class="absolute inset-x-0 h-1 bg-primary/50 shadow-[0_0_15px_rgba(45,89,39,0.8)] top-1/2 -translate-y-1/2"></div>
</div>
</div>
<!-- Status Info -->
<div class="mt-8 w-full bg-primary/5 dark:bg-primary/10 rounded-xl p-4 flex items-center gap-4 border border-primary/20">
<div class="bg-primary text-white p-2 rounded-lg">
<span class="material-symbols-outlined">location_on</span>
</div>
<div class="flex-1">
<p class="text-xs text-primary font-semibold uppercase tracking-wider">Lokasi Saat Ini</p>
<p class="text-sm font-medium text-slate-800 dark:text-slate-200">Pos Pengumpulan Sukamakmur</p>
</div>
</div>
<!-- Action Buttons -->
<div class="flex items-center justify-center gap-8 py-10 w-full">
<button class="flex flex-col items-center gap-2 group">
<div class="flex size-14 items-center justify-center rounded-full bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 shadow-lg border border-slate-100 dark:border-slate-700 group-active:scale-95 transition-all">
<span class="material-symbols-outlined">image</span>
</div>
<span class="text-xs font-medium text-slate-500">Galeri</span>
</button>
<button class="flex size-20 items-center justify-center rounded-full bg-primary text-white shadow-xl shadow-primary/30 active:scale-90 transition-all border-4 border-white dark:border-slate-900">
<span class="material-symbols-outlined !text-4xl">photo_camera</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="flex size-14 items-center justify-center rounded-full bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 shadow-lg border border-slate-100 dark:border-slate-700 group-active:scale-95 transition-all">
<span class="material-symbols-outlined">flashlight_on</span>
</div>
<span class="text-xs font-medium text-slate-500">Senter</span>
</button>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-6 pt-3">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="dashboard.html">
<span class="material-symbols-outlined">home</span>
<p class="text-xs font-medium leading-normal tracking-wide">Beranda</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="marketplace_history.html">
<span class="material-symbols-outlined">history</span>
<p class="text-xs font-medium leading-normal tracking-wide">Riwayat</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<p class="text-xs font-bold leading-normal tracking-wide">Validasi</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="profile_settings.html">
<span class="material-symbols-outlined">person</span>
<p class="text-xs font-medium leading-normal tracking-wide">Profil</p>
</a>
</div>
</div>
</body></html>
