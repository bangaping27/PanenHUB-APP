<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#2d5927",
                "background-light": "#f6f7f6",
                "background-dark": "#161d15",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<title>Forgot Password - PanenHub</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Header / Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<button aria-label="Go back" type="button" onclick="window.location.href='login.html'" class="flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary text-[24px]">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[20px]">potted_plant</span>
</div>
<span class="font-bold text-lg text-primary tracking-tight">PanenHub</span>
</div>
<div class="size-12"></div> <!-- Spacer for centering -->
</div>
<!-- Content Section -->
<main class="flex-1 flex flex-col max-w-[480px] mx-auto w-full">
<div class="px-4 pt-10 pb-6">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight text-left pb-3">
                    Forgot Password
                </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">
                    Don't worry! Enter your registered email or phone number to receive a reset link.
                </p>
</div>
<!-- Illustration / Icon Decor -->
<div class="flex justify-center py-8">
<div class="relative">
<div class="absolute inset-0 bg-primary/10 blur-3xl rounded-full"></div>
<div class="relative bg-primary/5 p-8 rounded-full">
<span class="material-symbols-outlined text-primary text-[80px]" style="font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48">lock_reset</span>
</div>
</div>
</div>
<!-- Form -->
<div class="flex flex-col gap-6 px-4 py-3">
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">Email or Phone Number</span>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">mail</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary h-14 placeholder:text-slate-400 pl-12 pr-4 text-base font-normal leading-normal transition-all" placeholder="e.g. name@email.com or +62..." type="text"/>
</div>
</label>
<button type="button" onclick="window.location.href='verifikasi_otp.html'" class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all active:scale-[0.98]">
<span class="truncate">Send Reset Link</span>
</button>
</div>
<!-- Footer Help -->
<div class="mt-auto p-6 flex flex-col items-center gap-4">
<p class="text-slate-500 text-sm">
                    Remember your password? 
                    <a class="text-primary font-bold hover:underline" href="login.html">Sign In</a>
</p>
<div class="flex items-center gap-2 text-slate-400 text-xs uppercase tracking-widest font-semibold">
<span class="h-px w-8 bg-slate-200 dark:bg-slate-800"></span>
<span>Support</span>
<span class="h-px w-8 bg-slate-200 dark:bg-slate-800"></span>
</div>
<div class="flex gap-4">
<button class="p-2 rounded-full border border-slate-200 dark:border-slate-800 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">help</span>
</button>
<button class="p-2 rounded-full border border-slate-200 dark:border-slate-800 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">chat_bubble</span>
</button>
</div>
</div>
</main>
</div>
</body></html>
