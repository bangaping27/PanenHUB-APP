<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#2d5927",
                "background-light": "#f6f7f6",
                "background-dark": "#161d15",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<title>PanenHub - Reset Password</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div onclick="window.location.href='verifikasi_otp.html'" class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Reset Password</h2>
</header>
<main class="flex-1 max-w-[480px] w-full mx-auto flex flex-col px-4">
<div class="pt-8 pb-6 text-center">
<div class="inline-flex items-center justify-center p-4 bg-primary/10 rounded-full mb-4">
<span class="material-symbols-outlined text-primary text-4xl">lock_reset</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight mb-2">Create New Password</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">Your new password must be different from previous used passwords.</p>
</div>
<form class="space-y-6">
<div class="flex flex-col gap-1">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">New Password</p>
<div class="flex w-full items-stretch rounded-lg group">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg rounded-r-none border-r-0 text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-1 focus:ring-primary border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="Enter new password" type="password"/>
<div class="text-slate-400 flex border border-slate-300 dark:border-slate-700 border-l-0 bg-white dark:bg-slate-800 items-center justify-center pr-[15px] rounded-r-lg cursor-pointer">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
<p class="text-xs text-slate-500 mt-1 px-1">Must be at least 8 characters long.</p>
</div>
<div class="flex flex-col gap-1">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Confirm New Password</p>
<div class="flex w-full items-stretch rounded-lg group">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg rounded-r-none border-r-0 text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-1 focus:ring-primary border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="Confirm new password" type="password"/>
<div class="text-slate-400 flex border border-slate-300 dark:border-slate-700 border-l-0 bg-white dark:bg-slate-800 items-center justify-center pr-[15px] rounded-r-lg cursor-pointer">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
</div>
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl transition-colors shadow-lg shadow-primary/20" type="button" onclick="window.location.href='login.html'">
                        Update Password
                    </button>
</div>
</form>
<div class="mt-8 p-4 bg-primary/5 border border-primary/10 rounded-xl hidden">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary">check_circle</span>
<div>
<p class="font-bold text-slate-900 dark:text-slate-100">Password reset successful</p>
<p class="text-sm text-slate-600 dark:text-slate-400">You can now sign in with your new password.</p>
<button class="mt-3 text-primary font-semibold text-sm">Log in now</button>
</div>
</div>
</div>
<div class="mt-auto py-8 flex flex-col items-center">
<p class="text-slate-500 text-sm">Need help? <a class="text-primary font-semibold" href="#">Contact Support</a></p>
</div>
</main>
<div class="h-5 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
